services:
  - type: web
    name: travel-ai-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    healthCheckPath: /api/v1/health
    disk:
      name: sqlite-data
      mountPath: /app
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./travel_ai.db
      - key: DEBUG
        value: "false"
      - key: ALLOWED_ORIGINS
        value: https://travel-ai-jwhm.onrender.com,https://travel-ai-frontend-utj9.onrender.com,https://travel-ai-frontend.onrender.com,http://localhost:3000
      - key: LLM_PROVIDER
        value: openai
      - key: LLM_BASE_URL
        value: https://api.deepseek.com/v1
      - key: LLM_MODEL
        value: deepseek-chat
      - key: OPENAI_API_KEY
        sync: false
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: AMADEUS_API_KEY
        sync: false
      - key: AMADEUS_API_SECRET
        sync: false
      - key: TRIPADVISOR_API_KEY
        sync: false

  - type: web
    name: travel-ai-frontend
    runtime: node
    rootDir: frontend
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NEXT_PUBLIC_API_URL
        value: https://travel-ai-backend-vwwk.onrender.com/api/v1
